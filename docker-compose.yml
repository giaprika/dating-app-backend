version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: dating_app_postgres
    environment:
      POSTGRES_DB: dating_app_db
      POSTGRES_USER: dating_user
      POSTGRES_PASSWORD: dating_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dating_app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dating_user -d dating_app_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dating_app_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - dating_app_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  dating_app_network:
    driver: bridge
